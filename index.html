<script>
// ===== SUPABASE CONNECTION =====
const SUPABASE_URL='https://khvehsncuqkndvzkqwmh.supabase.co';
const SUPABASE_KEY='sb_publishable_uem7AxV2hp7ohu-y3rwBJA_YseASyrd';
const sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

let syncOk=false;
function setSyncStatus(s,msg){const el=document.getElementById('syncStatus');el.className='sync-status sync-'+s;el.textContent=msg;}

// ===== LOAD / SAVE =====
async function loadFromSupabase(){
  try{
    const{data,error}=await sb.from('budsjett_data').select('*').eq('id','shared').single();
    if(error) throw error;
    if(data){
      tilbudStore=data.tilbud||{};
      runningCosts=data.running_costs||[];
      oppBudgets=data.opp_budgets||{};
    }
    syncOk=true;setSyncStatus('ok','✅ Koblet til — data synkes live');
  }catch(e){
    console.warn('Supabase load feilet, bruker lokal data:',e);
    tilbudStore=JSON.parse(localStorage.getItem('fvf_tB')||'{}');
    runningCosts=JSON.parse(localStorage.getItem('fvf_rcB')||'[]');
    oppBudgets=JSON.parse(localStorage.getItem('fvf_obB')||'{}');
    setSyncStatus('err','⚠️ Offline — bruker lokale data');
  }
  render();
}

let saveTimeout=null;
function saveData(){
  localStorage.setItem('fvf_tB',JSON.stringify(tilbudStore));
  localStorage.setItem('fvf_rcB',JSON.stringify(runningCosts));
  localStorage.setItem('fvf_obB',JSON.stringify(oppBudgets));
  if(saveTimeout) clearTimeout(saveTimeout);
  saveTimeout=setTimeout(async()=>{
    try{
      const{error}=await sb.from('budsjett_data').update({tilbud:tilbudStore,running_costs:runningCosts,opp_budgets:oppBudgets,updated_at:new Date().toISOString()}).eq('id','shared');
      if(error) throw error;
      if(!syncOk){syncOk=true;setSyncStatus('ok','✅ Koblet til — data synkes live');}
    }catch(e){console.warn('Save feilet:',e);setSyncStatus('err','⚠️ Lagring feilet — prøver igjen');}
  },800);
}

// REALTIME
function setupRealtime(){
  sb.channel('budsjett_changes').on('postgres_changes',{event:'UPDATE',schema:'public',table:'budsjett_data',filter:'id=eq.shared'},(payload)=>{
    const d=payload.new;
    if(d){tilbudStore=d.tilbud||{};runningCosts=d.running_costs||[];oppBudgets=d.opp_budgets||{};render();}
  }).subscribe();
}

// ===== DATA =====
const MONTHS=['Jan','Feb','Mar','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Des'];
const YEARS=[2026,2027,2028,2029,2030];

const DEFAULT_OPP=[  {id:'opp_arkitekt',name:'Arkitekt / planlegging',defaultBudget:400000},  {id:'opp_entreprenor',name:'Entreprenør (rigg, drift, prosjektledelse)',defaultBudget:500000},  {id:'opp_tomrer',name:'Tømrer / snekkerarbeid',defaultBudget:800000},  {id:'opp_elektro',name:'Elektriker / el-installasjon',defaultBudget:650000},  {id:'opp_bad_vvs',name:'Bad / VVS / rørlegger',defaultBudget:500000},  {id:'opp_kjokken',name:'Kjøkken / kantine / pantry',defaultBudget:350000},  {id:'opp_maler',name:'Maler / overflatebehandling',defaultBudget:250000},  {id:'opp_innredning',name:'Innredning (møbler, belysning, soner)',defaultBudget:600000},  {id:'opp_tekn_kontor',name:'Teknisk kontorutstyr (AV, nettverk, skjermer)',defaultBudget:400000},  {id:'opp_tilgang',name:'Tilgangskontroll (lås, nøkkelkort, alarm)',defaultBudget:250000},  {id:'opp_diverse',name:'Diverse / uforutsett',defaultBudget:300000},];

let oppBudgets={},tilbudStore={},runningCosts=[],currentYear=2026,editMode=false,editDraft={};

function getSavedOppB(id){return oppBudgets[id]!==undefined?oppBudgets[id]:(DEFAULT_OPP.find(d=>d.id===id)||{}).defaultBudget||0;}
function getOppTotal(){return DEFAULT_OPP.reduce((s,d)=>s+getSavedOppB(d.id),0);}
function getOppItems(){return DEFAULT_OPP.map(d=>({...d,budget:getSavedOppB(d.id)}));}

const INV_FIXED=[{id:'maskiner',name:'Etableringskost strikkemaskiner/symaskiner',budget:1210000},{id:'stiftelse',name:'Opprettelse av stiftelse',budget:300000}];
function getInvestTotal(){return INV_FIXED.reduce((s,i)=>s+i.budget,0)+getOppTotal();}

// ===== HELPERS =====
function fmt(n){return Math.round(n).toLocaleString('nb-NO');}
function parseNum(s){return parseFloat(String(s).replace(/\s/g,'').replace(/,/g,'.'))||0;}
function getKey(y,id){return y+'_'+id;}
function getValgtSum(y,id){return(tilbudStore[getKey(y,id)]||[]).reduce((s,t)=>s+(t.valgt?t.pris:0),0);}
function getRunningForYear(pid,yr){let t=0;runningCosts.filter(rc=>rc.id===pid).forEach(rc=>{if(yr<rc.startYear)return;t+=rc.mndBelop*(yr===rc.startYear?(12-rc.startMonth):12);});return t;}
function getRunningBreakdown(pid,yr){const m=new Array(12).fill(0);runningCosts.filter(rc=>rc.id===pid).forEach(rc=>{if(yr<rc.startYear)return;for(let i=(yr===rc.startYear?rc.startMonth:0);i<12;i++)m[i]+=rc.mndBelop;});return m;}

function sHTML(p){return p>100?'<span class="badge badge-red">Over</span>':p>80?'<span class="badge badge-yellow">Nærmer seg</span>':'<span class="badge badge-green">OK</span>';}
function sC(p){return p>100?'status-over':p>80?'status-warn':'status-ok';}
function bC(p){return p>100?'var(--red)':p>80?'var(--yellow)':'var(--green)';}
function vC(v){return v>=0?'var(--green)':'var(--red)';}

function showPage(p){document.querySelectorAll('.page').forEach(el=>el.classList.remove('active'));document.querySelectorAll('.page-tab').forEach(el=>el.classList.remove('active'));document.getElementById('page-'+p).classList.add('active');document.querySelectorAll('.page-tab').forEach(el=>{if((p==='invest'&&el.textContent.includes('Invest'))||(p==='drift'&&el.textContent.includes('Drift')))el.classList.add('active');});render();}

function renderTilbud(key){const t=tilbudStore[key]||[];if(!t.length)return'<div style="color:var(--text-muted);font-size:0.83em;">Ingen tilbud ennå.</div>';let h='<ul class="tilbud-list">';t.forEach((x,i)=>{h+=`<li class="tilbud-item"><span class="leverandor">${x.leverandor}</span><span class="pris">${fmt(x.pris)} kr</span><span style="color:var(--text-muted);flex:1">${x.notat||''}</span><span style="color:var(--green);font-size:0.83em">${x.valgt?'✅':''}</span><button class="btn btn-small ${x.valgt?'btn-ghost':'btn-success'}" onclick="toggleValgt('${key}',${i})">${x.valgt?'Fjern':'Velg'}</button><button class="btn btn-small btn-danger" onclick="removeTilbud('${key}',${i})">✕</button></li>`;});return h+'</ul>';}

function renderRunningList(pid,yr){const entries=runningCosts.filter(rc=>rc.id===pid&&rc.startYear<=yr);if(!entries.length)return'';let h='<div style="margin-top:8px;font-size:0.76em;font-weight:600;color:var(--fjord);margin-bottom:6px;">Løpende kostnader '+yr+':</div><ul class="tilbud-list">';entries.forEach(rc=>{const gi=runningCosts.indexOf(rc);const mt=(yr===rc.startYear)?(12-rc.startMonth):12;h+=`<li class="tilbud-item"><span class="running-tag">Fra ${MONTHS[rc.startMonth]} ${rc.startYear}</span><span class="pris" style="color:var(--fjord)">${fmt(rc.mndBelop)} kr/mnd</span><span style="color:var(--text);font-weight:600;">→ ${fmt(rc.mndBelop*mt)} i ${yr}</span><span style="flex:1;color:var(--text-muted)">${rc.notat||''}</span><button class="btn btn-small btn-danger" onclick="removeRunning(${gi})">✕</button></li>`;});h+='</ul>';const bd=getRunningBreakdown(pid,yr);const mx=Math.max(...bd,1);h+='<div style="display:flex;gap:3px;align-items:flex-end;height:36px;margin-top:6px;">';bd.forEach((v,i)=>{h+=`<div title="${MONTHS[i]}: ${fmt(v)}" style="flex:1;background:${v>0?'var(--fjord)':'var(--border-light)'};height:${Math.max(v/mx*100,4)}%;border-radius:3px 3px 0 0;opacity:${v>0?0.7:0.3};"></div>`;});h+='</div><div style="display:flex;gap:3px;margin-top:2px;">';MONTHS.forEach(m=>{h+=`<div style="flex:1;text-align:center;font-size:0.58em;color:var(--text-muted);">${m.charAt(0)}</div>`;});h+='</div>';return h;}

function renderYears(){const c=document.getElementById('yearSelector');c.innerHTML='';YEARS.forEach(y=>{const b=document.createElement('button');b.className='year-btn'+(y===currentYear?' active':'');b.textContent=y;b.onclick=()=>{currentYear=y;render();};c.appendChild(b);});}

// ===== EDIT MODE =====
function startEdit(){editMode=true;editDraft={};DEFAULT_OPP.forEach(d=>{editDraft[d.id]=getSavedOppB(d.id);});render();}
function cancelEdit(){editMode=false;editDraft={};render();}
function saveEdit(){Object.keys(editDraft).forEach(id=>{oppBudgets[id]=editDraft[id];});editMode=false;editDraft={};saveData();render();}
function getDraftTotal(){return DEFAULT_OPP.reduce((s,d)=>s+(editDraft[d.id]!==undefined?editDraft[d.id]:getSavedOppB(d.id)),0);}
function updateDraft(id,val){editDraft[id]=parseNum(val);}

// ===== MAIN RENDER =====
function render(){
  renderYears();
  const ms=document.getElementById('monthSelect');ms.innerHTML='';MONTHS.forEach((m,i)=>{ms.innerHTML+=`<option value="${i}">${m} ${currentYear}</option>`;});

  const oppTotal=getOppTotal(),investTotal=getInvestTotal();
  let iU=0;INV_FIXED.forEach(i=>{iU+=getValgtSum(2026,i.id);});getOppItems().forEach(i=>{iU+=getValgtSum(2026,i.id);});
  const iR=investTotal-iU,iP=investTotal>0?iU/investTotal*100:0,oppDiff=oppTotal-OPP_ORIGINAL;

  document.getElementById('investSummary').innerHTML=`
    <div class="card"><div class="card-icon">🏗️</div><div class="card-label">Investeringsbudsjett</div><div class="card-value">${fmt(investTotal)}</div><div class="card-sub">Søknad: ${fmt(OPP_ORIGINAL+INV_FIXED.reduce((s,i)=>s+i.budget,0))}${oppDiff!==0?' · <span style="color:'+(oppDiff>0?'var(--red)':'var(--green)')+'">'+(oppDiff>0?'+':'')+fmt(oppDiff)+'</span>':''}</div></div>
    <div class="card"><div class="card-icon">📋</div><div class="card-label">Valgte tilbud</div><div class="card-value" style="color:var(--accent)">${fmt(iU)}</div><div class="card-sub">${iP.toFixed(1)}%</div></div>
    <div class="card"><div class="card-icon">✨</div><div class="card-label">Gjenstående</div><div class="card-value" style="color:${vC(iR)}">${fmt(iR)}</div><div class="progress-bar"><div class="progress-fill" style="width:${Math.min(iP,100)}%;background:${bC(iP)}"></div></div></div>`;

  const eb=document.getElementById('editBar');
  if(editMode){const dt=getDraftTotal(),dd2=dt-OPP_ORIGINAL;eb.className='edit-bar';eb.innerHTML=`<div class="edit-label"><span class="edit-indicator"></span>Redigeringsmodus — Draftsum: <strong>${fmt(dt)}</strong>${dd2!==0?' <span style="color:'+(dd2>0?'var(--red)':'var(--green)')+'">('+(dd2>0?'+':'')+fmt(dd2)+')</span>':''}</div><button class="btn btn-save" onclick="saveEdit()">💾 Lagre</button><button class="btn btn-ghost" onclick="cancelEdit()">Avbryt</button>`;}else{eb.className='hidden';}

  let ih='',gIdx=0;
  INV_FIXED.forEach(item=>{const brukt=getValgtSum(2026,item.id),rest=item.budget-brukt,pct=item.budget>0?brukt/item.budget*100:0;const key=getKey(2026,item.id),did='i_'+gIdx;ih+=`<tr><td><button class="expand-btn" id="btn_${did}" onclick="toggleRow('${did}')">▶</button></td><td class="post-name">${item.name}</td><td>${fmt(item.budget)}</td><td style="color:var(--accent)">${fmt(brukt)}</td><td class="remaining" style="color:${vC(rest)}">${fmt(rest)}</td><td>${sHTML(pct)}<div class="progress-bar"><div class="progress-fill" style="width:${Math.min(pct,100)}%;background:${bC(pct)}"></div></div></td></tr><tr id="${did}" class="detail-row hidden"><td colspan="6">${renderTilbud(key)}</td></tr>`;gIdx++;});

  const oppItems=getOppItems();let gU=0;oppItems.forEach(i=>{gU+=getValgtSum(2026,i.id);});const gR=oppTotal-gU,gP=oppTotal>0?gU/oppTotal*100:0;
  ih+=`<tr class="sub-group-header"><td></td><td>🔨 Oppussing + innredning${!editMode?'<br><span class="group-total-note">Sum: <strong>'+fmt(oppTotal)+'</strong></span>':''}</td><td><strong>${fmt(oppTotal)}</strong><div class="opp-original">Søknad: ${fmt(OPP_ORIGINAL)}</div></td><td style="color:var(--accent)">${fmt(gU)}</td><td class="remaining" style="color:${vC(gR)}">${fmt(gR)}</td><td>${!editMode?'<button class="btn btn-small btn-edit" onclick="startEdit()">✏️ Rediger</button>':''}<br>${sHTML(gP)}<div class="progress-bar"><div class="progress-fill" style="width:${Math.min(gP,100)}%;background:${bC(gP)}"></div></div></td></tr>`;

  oppItems.forEach(item=>{const brukt=getValgtSum(2026,item.id);const bVal=editMode?(editDraft[item.id]!==undefined?editDraft[item.id]:item.budget):item.budget;const rest=bVal-brukt,pct=bVal>0?brukt/bVal*100:0;const key=getKey(2026,item.id),did='i_'+gIdx;const isChanged=oppBudgets[item.id]!==undefined&&oppBudgets[item.id]!==item.defaultBudget;let bc=editMode?`<input class="editable-budget" type="text" value="${fmt(bVal)}" oninput="updateDraft('${item.id}',this.value)"/><span class="budget-hint">Forslag: ${fmt(item.defaultBudget)}</span>`:`<span class="budget-display">${fmt(bVal)}</span>${isChanged?'<span class="budget-hint">Forslag: '+fmt(item.defaultBudget)+'</span>':''}`;ih+=`<tr class="sub-item"><td><button class="expand-btn" id="btn_${did}" onclick="toggleRow('${did}')">▶</button></td><td class="post-name" style="padding-left:32px;">↳ ${item.name}</td><td>${bc}</td><td style="color:var(--accent)">${fmt(brukt)}</td><td class="remaining" style="color:${vC(rest)}">${fmt(rest)}</td><td>${sHTML(pct)}<div class="progress-bar"><div class="progress-fill" style="width:${Math.min(pct,100)}%;background:${bC(pct)}"></div></div></td></tr><tr id="${did}" class="detail-row hidden"><td colspan="6">${renderTilbud(key)}</td></tr>`;gIdx++;});

  ih+=`<tr class="totals-row"><td></td><td><strong>TOTALT</strong></td><td><strong>${fmt(investTotal)}</strong></td><td style="color:var(--accent)"><strong>${fmt(iU)}</strong></td><td class="remaining" style="color:${vC(iR)}"><strong>${fmt(iR)}</strong></td><td></td></tr>`;
  document.getElementById('investBody').innerHTML=ih;

  const isel=document.getElementById('investSelect');isel.innerHTML='<option value="">Velg post...</option>';INV_FIXED.forEach(c=>{isel.innerHTML+=`<option value="${c.id}">${c.name}</option>`;});isel.innerHTML+='<optgroup label="🔨 Oppussing">';oppItems.forEach(i=>{isel.innerHTML+=`<option value="${i.id}">${i.name}</option>`;});isel.innerHTML+='</optgroup>';

  // DRIFT
  const dd=driftData[currentYear];if(!dd)return;
  let cB=0,cU=0;dd.categories.forEach(cat=>{cat.items.forEach(item=>{cB+=item.budget;cU+=getRunningForYear(item.id,currentYear);});});
  const cR=cB-cU,cP=cB>0?cU/cB*100:0;
  const ac=new Set(runningCosts.filter(rc=>rc.startYear<=currentYear).map(rc=>rc.id)).size;
  document.getElementById('driftInfo').innerHTML=`💡 <strong>Løpende kostnader:</strong> Legg inn mnd-beløp og startmåned. Løper automatisk ut året og videre. <em>${ac} poster påvirker ${currentYear}.</em>`;
  document.getElementById('driftSummary').innerHTML=`
    <div class="card"><div class="card-icon">💰</div><div class="card-label">Budsjett ${currentYear}</div><div class="card-value">${fmt(cB)}</div><div class="card-sub">Inntekt: ${fmt(dd.totalRevenue)}</div></div>
    <div class="card"><div class="card-icon">📊</div><div class="card-label">Løpende</div><div class="card-value" style="color:var(--fjord)">${fmt(cU)}</div><div class="card-sub">${cP.toFixed(1)}%</div></div>
    <div class="card"><div class="card-icon">✨</div><div class="card-label">Gjenstående</div><div class="card-value" style="color:${vC(cR)}">${fmt(cR)}</div><div class="progress-bar"><div class="progress-fill" style="width:${Math.min(cP,100)}%;background:${bC(cP)}"></div></div></div>
    <div class="card"><div class="card-icon">📈</div><div class="card-label">Resultat</div><div class="card-value" style="color:${vC(dd.totalRevenue-cU)}">${fmt(dd.totalRevenue-cU)}</div></div>`;

  let ch='',dIdx=0;
  dd.categories.forEach(cat=>{ch+=`<tr class="cat-header"><td colspan="6">${cat.name}</td></tr>`;cat.items.forEach(item=>{const brukt=getRunningForYear(item.id,currentYear),rest=item.budget-brukt,pct=item.budget>0?brukt/item.budget*100:0;const did='d_'+dIdx;const entries=runningCosts.filter(rc=>rc.id===item.id&&rc.startYear<=currentYear);let tags='';if(entries.length){const bd=getRunningBreakdown(item.id,currentYear);const am=bd.filter(v=>v>0);if(am.length){tags=`<div style="margin-top:4px;"><span class="running-tag">${fmt(bd.reduce((a,b)=>a+b,0)/am.length)} kr/mnd</span><span class="actual-tag">${am.length} mnd</span></div>`;}}ch+=`<tr><td><button class="expand-btn" id="btn_${did}" onclick="toggleRow('${did}')">▶</button></td><td class="post-name">${item.name}${tags}</td><td>${fmt(item.budget)}</td><td style="color:var(--fjord);font-weight:600">${fmt(brukt)}</td><td class="remaining" style="color:${vC(rest)}">${fmt(rest)}</td><td>${sHTML(pct)}<div class="progress-bar"><div class="progress-fill" style="width:${Math.min(pct,100)}%;background:${bC(pct)}"></div></div></td></tr><tr id="${did}" class="detail-row hidden"><td colspan="6">${renderRunningList(item.id,currentYear)}</td></tr>`;dIdx++;});});
  let tB=0,tU=0;dd.categories.forEach(cat=>{cat.items.forEach(item=>{tB+=item.budget;tU+=getRunningForYear(item.id,currentYear);});});
  ch+=`<tr class="totals-row"><td></td><td><strong>TOTALT</strong></td><td><strong>${fmt(tB)}</strong></td><td style="color:var(--fjord)"><strong>${fmt(tU)}</strong></td><td class="remaining" style="color:${vC(tB-tU)}"><strong>${fmt(tB-tU)}</strong></td><td></td></tr>`;
  document.getElementById('budgetBody').innerHTML=ch;
  const sel=document.getElementById('postSelect');sel.innerHTML='<option value="">Velg post...</option>';dd.categories.forEach(cat=>{sel.innerHTML+=`<optgroup label="${cat.name}">`;cat.items.forEach(i=>{sel.innerHTML+=`<option value="${i.id}">${i.name}</option>`;});sel.innerHTML+='</optgroup>';});
}

// ===== ACTIONS =====
function toggleRow(id){const el=document.getElementById(id),btn=document.getElementById('btn_'+id);if(el){el.classList.toggle('hidden');if(btn)btn.classList.toggle('open');}}
function toggleValgt(key,idx){if(tilbudStore[key]?.[idx]!==undefined){tilbudStore[key][idx].valgt=!tilbudStore[key][idx].valgt;saveData();render();}}
function removeTilbud(key,idx){if(tilbudStore[key]){tilbudStore[key].splice(idx,1);saveData();render();}}
function removeRunning(idx){runningCosts.splice(idx,1);saveData();render();}

function addTilbud(){
  const pid=document.getElementById('investSelect').value,lev=document.getElementById('investLeverandorInput').value.trim(),pris=parseNum(document.getElementById('investPrisInput').value),notat=document.getElementById('investNotatInput').value.trim();
  if(!pid||!lev||!pris){alert('Fyll inn post, leverandør og pris.');return;}
  const key=getKey(2026,pid);if(!tilbudStore[key])tilbudStore[key]=[];tilbudStore[key].push({leverandor:lev,pris,notat,valgt:false});saveData();
  document.getElementById('investLeverandorInput').value='';document.getElementById('investPrisInput').value='';document.getElementById('investNotatInput').value='';render();
}
function addFaktisk(){
  const pid=document.getElementById('postSelect').value,month=parseInt(document.getElementById('monthSelect').value),mnd=parseNum(document.getElementById('faktiskInput').value),notat=document.getElementById('faktiskNotatInput').value.trim();
  if(!pid||!mnd){alert('Velg post og oppgi beløp.');return;}
  runningCosts.push({id:pid,startYear:currentYear,startMonth:month,mndBelop:mnd,notat});saveData();
  document.getElementById('faktiskInput').value='';document.getElementById('faktiskNotatInput').value='';render();
}
